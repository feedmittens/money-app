name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

# CodeQL static analysis is handled by GitHub's built-in default setup.
# This workflow handles dependency auditing only.

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Audit root dependencies
        run: npm audit --audit-level=high

      - name: Audit server dependencies
        run: npm audit --audit-level=high --prefix server

      - name: Audit client dependencies
        # --omit=dev: esbuild/vite CVEs are dev-tool only (dev server, Deno registry)
        # and are not present in the production build output served by nginx.
        run: npm audit --audit-level=high --omit=dev --prefix client
