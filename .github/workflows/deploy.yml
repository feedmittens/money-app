name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  # ── Stage 1: deploy to staging (CT 201) and smoke test ──────────────────────
  staging:
    name: Deploy → Staging
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Pull latest code into staging (CT 201)
        run: |
          pct exec 201 -- bash -c 'cd /opt/money-app && git fetch --quiet origin main && git reset --hard origin/main'

      - name: Run deploy script in staging
        run: |
          pct push 201 "$GITHUB_WORKSPACE/scripts/container-deploy.sh" /tmp/container-deploy.sh
          pct exec 201 -- bash /tmp/container-deploy.sh

      - name: Smoke test staging
        run: |
          STAGING_IP=$(pct exec 201 -- hostname -I | awk '{print $1}')
          echo "Staging IP: $STAGING_IP"
          bash "$GITHUB_WORKSPACE/test/smoke.sh" "https://$STAGING_IP"

  # ── Stage 2: deploy to prod (CT 200) only if staging passed ─────────────────
  prod:
    name: Deploy → Prod
    runs-on: self-hosted
    needs: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Pull latest code into prod (CT 200)
        run: |
          pct exec 200 -- bash -c 'cd /opt/money-app && git fetch --quiet origin main && git reset --hard origin/main'

      - name: Run deploy script in prod
        run: |
          pct push 200 "$GITHUB_WORKSPACE/scripts/container-deploy.sh" /tmp/container-deploy.sh
          pct exec 200 -- bash /tmp/container-deploy.sh

      - name: Smoke test prod
        run: |
          PROD_IP=$(pct exec 200 -- hostname -I | awk '{print $1}')
          echo "Prod IP: $PROD_IP"
          bash "$GITHUB_WORKSPACE/test/smoke.sh" "https://$PROD_IP"
