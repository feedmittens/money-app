<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- Four vertical tally marks -->
  <line x1="12" y1="14" x2="12" y2="34" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="19" y1="14" x2="19" y2="34" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="26" y1="14" x2="26" y2="34" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="33" y1="14" x2="33" y2="34" stroke="white" stroke-width="3.2" stroke-linecap="round"/>
  <!-- Diagonal crossing mark (accent color) -->
  <line x1="8" y1="31" x2="38" y2="17" stroke="#86efac" stroke-width="3.2" stroke-linecap="round"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
</svg>
