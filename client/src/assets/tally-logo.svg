<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Four vertical tally marks -->
  <line x1="7"  y1="10" x2="7"  y2="30" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round"/>
  <line x1="14" y1="10" x2="14" y2="30" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round"/>
  <line x1="21" y1="10" x2="21" y2="30" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="10" x2="28" y2="30" stroke="#4f8ef7" stroke-width="3" stroke-linecap="round"/>
  <!-- Diagonal crossing mark -->
  <line x1="4"  y1="28" x2="32" y2="12" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
</svg>
